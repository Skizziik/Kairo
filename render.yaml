services:
  - type: web
    name: kairo
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    envVars:
      - key: MINIAPP_URL
        sync: false
      - key: MINIAPP_TME_URL
        sync: false
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_WEBHOOK_SECRET
        sync: false
      - key: TG_ALLOWED_CHAT_ID
        sync: false
      - key: TG_ADMIN_IDS
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: CEREBRAS_MODEL
        value: qwen-3-235b-a22b-instruct-2507
      - key: CEREBRAS_BASE_URL
        value: https://api.cerebras.ai/v1
      - key: DATABASE_URL
        sync: false
      - key: STEAM_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: EMBED_MODEL
        value: mistral-embed
      - key: EMBED_DIM
        value: "1024"
      - key: CHAT_HISTORY_LIMIT
        value: "30"
      - key: MEMORY_TOP_K
        value: "5"
      - key: MEMORY_EXTRACT_EVERY
        value: "20"
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: kairo-casino-app
    runtime: static
    plan: free
    branch: main
    staticPublishPath: ./webapp
    pullRequestPreviewsEnabled: false
    buildFilter:
      paths:
        - webapp/**
    headers:
      - path: /*
        name: X-Frame-Options
        value: ALLOWALL
      - path: /*.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*.css
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*
        name: Cache-Control
        value: public, max-age=60
