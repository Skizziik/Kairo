services:
  - type: web
    name: kairo
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    envVars:
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_WEBHOOK_SECRET
        sync: false
      - key: TG_ALLOWED_CHAT_ID
        sync: false
      - key: TG_ADMIN_IDS
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: CEREBRAS_MODEL
        value: qwen-3-235b-a22b-instruct-2507
      - key: CEREBRAS_BASE_URL
        value: https://api.cerebras.ai/v1
      - key: DATABASE_URL
        sync: false
      - key: STEAM_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: EMBED_MODEL
        value: mistral-embed
      - key: EMBED_DIM
        value: "1024"
      - key: CHAT_HISTORY_LIMIT
        value: "30"
      - key: MEMORY_TOP_K
        value: "5"
      - key: MEMORY_EXTRACT_EVERY
        value: "20"
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: LOG_LEVEL
        value: INFO
