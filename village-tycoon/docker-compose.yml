# Village Tycoon — local dev stack on PC.
#
# Backend lives on Render (existing kairo-bot service); this compose just runs:
#   - frontend  : Vite + Phaser dev server with HMR
#   - tunnel    : Cloudflare Tunnel that exposes the dev server publicly
#                 so Telegram Mini App can open it.
#
# Usage:
#   1. cd village-tycoon
#   2. cp .env.example .env  and fill VILLAGER_API_BASE if you want to override
#   3. cp tunnel/cloudflared.yml.example tunnel/cloudflared.yml  and add tunnel ID + creds
#   4. docker compose up
#   5. Bot env: set VILLAGER_URL=https://<your-tunnel-domain>  and redeploy backend.

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vt-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src:ro
      - ./public:/app/public:ro
      - ./index.html:/app/index.html:ro
      - ./vite.config.ts:/app/vite.config.ts:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
    environment:
      VITE_API_BASE: ${VILLAGER_API_BASE:-https://kairo-bot-hc22.onrender.com}

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: vt-tunnel
    restart: unless-stopped
    depends_on:
      - frontend
    # Quick Tunnel — free, no account, no domain. Cloudflare assigns a temporary
    # URL like https://random-words.trycloudflare.com. URL changes on every
    # restart — read it from `docker logs vt-tunnel`.
    command: tunnel --no-autoupdate --url http://frontend:5173
